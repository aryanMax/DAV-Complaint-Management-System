{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="auth-container" style="max-width: 800px;">
        <h2>DAV College Admin Portal</h2>
        <p style="text-align: center;">Welcome back, <strong>{{ request.user.username }}</strong>! You are logged in as an Administrator.</p>
        
        <hr style="border: 1px solid #eee; margin: 20px 0;">

        <div style="display: flex; justify-content: space-around; margin-top: 30px;">
            <a href="{% url 'all_complaints' %}" class="submit-btn" style="text-align: center; text-decoration: none; width: 45%;">View All Complaints</a>
            
    

<a href="/logout/" class="submit-btn" style="text-align: center; text-decoration: none; width: 45%; background: #d9534f;">Logout</a>
        </div>
    </div>
</body>
</html>
