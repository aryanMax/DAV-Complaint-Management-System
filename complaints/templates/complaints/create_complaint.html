{% extends "complaints/base.html" %}
{% block content %}

<div class="page">
  <div class="card">

    <h2>Create Complaint</h2>
    <p class="muted">
      Clearly describe your issue so the administration can act faster.
    </p>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>Title</label>
        {{ form.title }}
      </div>

      <div class="form-group">
        <label>Description</label>
        {{ form.description }}
      </div>

      <div class="form-group">
        <label>Category</label>
        {{ form.category }}
      </div>

      <div class="actions">
        <button class="btn primary">Submit Complaint</button>
        <a href="{% url 'dashboard' %}" class="btn secondary">Back to Dashboard</a>
      </div>

    </form>

  </div>
</div>

{% endblock %}
