<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complaint System</title>



    <style>
        .status {
  padding: 6px 12px;
  border-radius: 20px;
  display: inline-block;
  font-weight: 600;
}

.status.PENDING { background: #fde68a; }
.status.IN_PROGRESS { background: #bfdbfe; }
.status.RESOLVED { background: #bbf7d0; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, #0f172a, #1e293b);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }

        .navbar a {
            color: #cbd5f5;
            margin-right: 20px;
            text-decoration: none;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #fff;
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 600;
            margin-right: 30px;
        }

        .logout-btn {
            border: 1px solid #cbd5f5;
            padding: 6px 14px;
            border-radius: 6px;
        }

        /* Page wrapper */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Dashboard cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: #fff;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 15px;
            color: #64748b;
        }

        .stat-number {
            margin-top: 10px;
            font-size: 36px;
            font-weight: 700;
        }

        /* Form card */
        .form-card {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
        }

        textarea {
            min-height: 120px;
        }

        button {
            background: #2563eb;
            color: #fff;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #1d4ed8;
        }
        .alert {
  background: #dcfce7;
  color: #166534;
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-weight: 500;
}

    </style>
</head>

<body>

<div class="navbar">
    <div class="nav-left">
        <div class="nav-title">Complaint System</div>
        <a href="/">Dashboard</a>
        <a href="{% url 'create_complaint' %}">Create Complaint</a>
<a href="{% url 'my_complaints' %}">My Complaints</a>

    </div>
  <form method="post" action="/accounts/logout/" onsubmit="return confirmLogout()">
  {% csrf_token %}
  <button type="submit" class="logout-btn">Logout</button>
</form>


</div>

<div class="container">

    {% if messages %}
        <div id="alert-box">
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>
<script>
    // Auto-dismiss success message
    setTimeout(() => {
        const alertBox = document.getElementById("alert-box");
        if (alertBox) {
            alertBox.style.opacity = "0";
            setTimeout(() => alertBox.remove(), 500);
        }
    }, 3000);

    // Logout confirmation
    function confirmLogout() {
        return confirm("Are you sure you want to logout?");
    }

    // Status color mapping
    document.querySelectorAll(".status").forEach(el => {
        el.classList.add(el.dataset.status);
    });
</script>


</body>
</html>
